{{define "content"}}
<div class="page-head">
  <h1>Clients</h1>
  <a class="btn" href="/clients/new">New client</a>
</div>

{{if .Data.Clients}}
<table class="table">
  <thead>
    <tr>
      <th>Name</th><th>Email</th><th>Company</th>
      <th class="num">Invoiced</th><th class="num">Outstanding</th><th></th>
    </tr>
  </thead>
  <tbody>
    {{range .Data.Clients}}
    <tr>
      <td>{{.Name}}</td>
      <td>{{.Email}}</td>
      <td>{{.Company}}</td>
      <td class="num">{{money .TotalInvoiced}}</td>
      <td class="num">{{money .Outstanding}}</td>
      <td class="actions-cell">
        <a href="/clients/{{.ID}}/edit">Edit</a>
        <form method="post" action="/clients/{{.ID}}/archive" onsubmit="return confirm('Archive this client?')">
          <button type="submit" class="link-btn">Archive</button>
        </form>
      </td>
    </tr>
    {{end}}
  </tbody>
</table>
{{else}}
<div class="panel"><p class="muted">No clients yet. Add your first client to get started.</p></div>
{{end}}
{{end}}
