{{define "content"}}
<h1>Settings</h1>
<p class="muted">Business profile — shown on every invoice PDF (FR-5.1).</p>

<form class="form" method="post" action="/settings" enctype="multipart/form-data">
  <section class="panel">
    <h2>Business profile</h2>

    <label class="field">
      <span class="field-label">Business name</span>
      <input type="text" name="business_name" value="{{.Data.Settings.BusinessName}}" required>
      {{with index .Data.Errors "business_name"}}<span class="field-error">{{.}}</span>{{end}}
    </label>

    <label class="field">
      <span class="field-label">Address</span>
      <textarea name="business_address" rows="3">{{.Data.Settings.BusinessAddress}}</textarea>
      {{with index .Data.Errors "business_address"}}<span class="field-error">{{.}}</span>{{end}}
    </label>

    <label class="field">
      <span class="field-label">Tax ID</span>
      <input type="text" name="tax_id" value="{{.Data.Settings.TaxID}}">
      {{with index .Data.Errors "tax_id"}}<span class="field-error">{{.}}</span>{{end}}
    </label>

    <label class="field">
      <span class="field-label">Logo</span>
      <input type="file" name="logo" accept="image/png,image/jpeg,image/gif,image/webp">
      <span class="field-hint">PNG, JPEG, GIF, or WebP. Leave empty to keep the current logo.</span>
      {{with index .Data.Errors "logo"}}<span class="field-error">{{.}}</span>{{end}}
      {{with .Data.Settings.LogoPath}}<img class="logo-preview" src="/uploads/{{.}}" alt="Current logo">{{end}}
    </label>

    <div class="actions">
      <button type="submit" class="btn">Save profile</button>
    </div>
  </section>
</form>

<form class="form" method="post" action="/settings/smtp">
  <section class="panel">
    <h2>Email (SMTP)</h2>
    <p class="muted">Used to send invoices and reminders. Credentials are stored
    server-side and never shown here (NFR-4).</p>

    <label class="field">
      <span class="field-label">SMTP host</span>
      <input type="text" name="smtp_host" value="{{.Data.Settings.SMTPHost}}" placeholder="smtp.gmail.com">
      {{with index .Data.Errors "smtp_host"}}<span class="field-error">{{.}}</span>{{end}}
    </label>

    <label class="field">
      <span class="field-label">SMTP port</span>
      <input type="text" name="smtp_port" value="{{.Data.Settings.SMTPPort}}" placeholder="587">
      {{with index .Data.Errors "smtp_port"}}<span class="field-error">{{.}}</span>{{end}}
    </label>

    <label class="field">
      <span class="field-label">Username</span>
      <input type="text" name="smtp_username" value="{{.Data.Settings.SMTPUsername}}" placeholder="you@example.com">
      {{with index .Data.Errors "smtp_username"}}<span class="field-error">{{.}}</span>{{end}}
    </label>

    <label class="field">
      <span class="field-label">Password</span>
      <input type="password" name="smtp_password" placeholder="leave blank to keep current">
      <span class="field-hint">For Gmail, use an app password.</span>
      {{with index .Data.Errors "smtp_password"}}<span class="field-error">{{.}}</span>{{end}}
    </label>

    <div class="actions">
      <button type="submit" class="btn">Save SMTP</button>
      <button type="submit" class="btn btn--secondary" formaction="/settings/smtp/test">Test connection</button>
    </div>
  </section>
</form>

<form class="form" method="post" action="/settings/invoicing">
  <section class="panel">
    <h2>Invoicing</h2>

    <label class="field">
      <span class="field-label">Invoice prefix</span>
      <input type="text" name="invoice_prefix" value="{{.Data.Settings.InvoicePrefix}}" placeholder="INV">
      {{with index .Data.Errors "invoice_prefix"}}<span class="field-error">{{.}}</span>{{end}}
    </label>

    <label class="field">
      <span class="field-label">Number format</span>
      <input type="text" name="invoice_format" value="{{.Data.Settings.InvoiceFormat}}" placeholder="{PREFIX}-{YYYY}-{SEQ}">
      <span class="field-hint">Tokens: {PREFIX}, {YYYY}, {YY}, {SEQ} (e.g. INV-2025-0001).</span>
      {{with index .Data.Errors "invoice_format"}}<span class="field-error">{{.}}</span>{{end}}
    </label>

    <label class="field">
      <span class="field-label">Default tax rate (%)</span>
      <input type="text" name="default_tax_rate" value="{{.Data.Settings.DefaultTaxRate}}" placeholder="0">
      <span class="field-hint">Pre-filled on new invoices; can be overridden per invoice.</span>
      {{with index .Data.Errors "default_tax_rate"}}<span class="field-error">{{.}}</span>{{end}}
    </label>

    <div class="actions">
      <button type="submit" class="btn">Save invoicing</button>
    </div>
  </section>
</form>
{{end}}
